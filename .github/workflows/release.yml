name: Release

on:
    push:
        tags:
            - "[0-9]+.[0-9]+.[0-9]+"

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Create ZIP
              run: |
                  cd custom_components/vtherm_smartpi
                  zip -r ../../vtherm_smartpi.zip .

            - name: "Set version number from trigger's tag"
              run: |
                  yq -i -o json '.version="${{ github.ref_name }}"' \
                  "${{ github.workspace }}/custom_components/vtherm_smartpi/manifest.json"

            - name: Create Release
              uses: softprops/action-gh-release@v1
              with:
                  tag_name: ${{ github.ref_name }}
                  name: Release ${{ github.ref_name }}
                  draft: true
                  prerelease: false
                  generate_release_notes: true
                  files: vtherm_smartpi.zip
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
