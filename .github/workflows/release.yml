name: Release

on:
    push:
        tags:
            - "[0-9]+.[0-9]+.[0-9]+"

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Create ZIP
              run: zip -r vtherm_smartpi.zip custom_components/vtherm_smartpi/

            - name: Create Release
              uses: softprops/action-gh-release@v1
              with:
                  tag_name: ${{ github.ref_name }}
                  name: Release ${{ github.ref_name }}
                  draft: false
                  prerelease: true
                  generate_release_notes: true
                  files: vtherm_smartpi.zip
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
