name: Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  pytest:
    name: Run Pytest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout vtherm_api
        uses: actions/checkout@v4
        with:
          repository: KipK/vtherm_api
          ref: api_algo
          path: vtherm_api_repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-homeassistant-custom-component coverage homeassistant
          # Add any additional project requirements if needed in the future

      - name: Add project root and vtherm_api to PYTHONPATH
        run: echo "PYTHONPATH=$PWD:$PWD/vtherm_api_repo/src:$PYTHONPATH" >> $GITHUB_ENV

      - name: Run Pytest
        run: pytest tests/
